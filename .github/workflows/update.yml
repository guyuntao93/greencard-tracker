name: Update Visa Bulletin Data

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Fetch latest bulletin and update data
        run: |
          cat > update_data.py <<'PYEOF'
          import re, sys, requests
          from bs4 import BeautifulSoup, NavigableString
          HTML="index.html"
          SLUG=["january","february","march","april","may","june","july","august","september","october","november","december"]
          VAL=re.compile(r"^(C|U|\d{2}[A-Z]{3}\d{2})$")
          HDR={"User-Agent":"Mozilla/5.0 (GreenCardTracker)"}
          def url(y,m):
              fy=y+1 if m>=10 else y
              return f"https://travel.state.gov/content/travel/en/legal/visa-law0/visa-bulletin/{fy}/visa-bulletin-for-{SLUG[m-1]}-{y}.html"
          def cell(table,label):
              rows=table.find_all("tr")
              if not rows: return None
              hd=[c.get_text(" ",strip=True).upper() for c in rows[0].find_all(["td","th"])]
              ci=next((i for i,h in enumerate(hd) if "CHINA" in h),None)
              if ci is None: return None
              for r in rows[1:]:
                  cs=[c.get_text(" ",strip=True) for c in r.find_all(["td","th"])]
                  if cs and cs[0].strip().upper().replace(".","").startswith(label):
                      if ci<len(cs):
                          v=cs[ci].strip().upper().replace(" ","")
                          return v if VAL.match(v) else None
              return None
          def parse(html):
              soup=BeautifulSoup(html,"html.parser")
              sec=None; res={"A":{},"B":{}}
              for el in soup.descendants:
                  if isinstance(el,NavigableString):
                      t=" ".join(str(el).upper().split())
                      if "FINAL ACTION" not in t and "DATES FOR FILING" not in t: continue
                      if "EMPLOYMENT" in t and "FINAL ACTION" in t: sec="A"
                      elif "EMPLOYMENT" in t and "DATES FOR FILING" in t: sec="B"
                      elif "FAMILY" in t: sec="FAM"
                  elif getattr(el,"name",None)=="table" and sec in ("A","B"):
                      for pref,label in (("1","1ST"),("3","3RD")):
                          if pref not in res[sec]:
                              v=cell(el,label)
                              if v: res[sec][pref]=v
              return res["A"].get("1"),res["B"].get("1"),res["A"].get("3"),res["B"].get("3")
          def nxt(y,m): return (y+1,1) if m==12 else (y,m+1)
          def main():
              text=open(HTML,encoding="utf-8").read()
              mt=re.search(r"/\*DATA_START\*/(.*?)/\*DATA_END\*/",text,re.S)
              if not mt: sys.exit("markers not found")
              ent=[(int(y),int(mo),a,b,c,d) for y,mo,a,b,c,d in re.findall(r'\["(\d{4})-(\d{2})","([^"]+)","([^"]+)","([^"]+)","([^"]+)"\]',mt.group(1))]
              if not ent: sys.exit("no entries")
              ent.sort(); have={(y,m) for y,m,*_ in ent}
              y,m=nxt(ent[-1][0],ent[-1][1]); added=[]
              for _ in range(3):
                  if (y,m) in have: y,m=nxt(y,m); continue
                  try: r=requests.get(url(y,m),headers=HDR,timeout=30)
                  except Exception as e: print("skip",y,m,e); break
                  if r.status_code==404: print("stop: not published yet",y,m); break
                  if r.status_code!=200: print("stop: HTTP",r.status_code); break
                  a,b,c,d=parse(r.text)
                  if a and b and c and d: added.append((y,m,a,b,c,d)); print("add",y,m,a,b,c,d)
                  else: print("warn: page found but not fully parsed",y,m,(a,b,c,d)); break
                  y,m=nxt(y,m)
              if not added: print("No new bulletins. index.html unchanged."); return
              alln=sorted(ent+added)
              lines="".join(f'  ["{yy}-{mm:02d}","{a}","{b}","{c}","{d}"],\n' for yy,mm,a,b,c,d in alln)
              nb="/*DATA_START*/\n"+lines+"/*DATA_END*/"
              open(HTML,"w",encoding="utf-8").write(re.sub(r"/\*DATA_START\*/.*?/\*DATA_END\*/",lambda _:nb,text,flags=re.S))
              print("Updated: added",len(added),"month(s)")
          main()
          PYEOF
          python update_data.py

      - name: Commit changes if any
        run: |
          if [ -n "$(git status --porcelain index.html)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add index.html
            git commit -m "Auto-update visa bulletin data"
            git push
            echo "Committed updated data."
          else
            echo "No changes to commit."
          fi
